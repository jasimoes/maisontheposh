<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaisonThePosh · Shoppable List</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;color:#1C1B19;font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px;}
.hdr{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #E2DED7;}
.hdr-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-weight:300;letter-spacing:.2em;color:#9E9C97;text-decoration:none;display:inline-block;margin-bottom:14px;}
.list-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:300;color:#1C1B19;margin-bottom:6px;}
.list-note{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;font-style:italic;color:#6B6860;line-height:1.6;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#E2DED7;}
.card{background:#fff;text-decoration:none;color:#1C1B19;display:block;transition:opacity .18s;}
.card:hover{opacity:.88;}
.card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#F2EFE9;}
.card-ph{width:100%;aspect-ratio:3/4;background:#F2EFE9;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:32px;color:#C8C5BE;}
.card-info{padding:9px 11px 13px;}
.card-brand{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9E9C97;margin-bottom:2px;}
.card-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;color:#1C1B19;line-height:1.35;margin-bottom:3px;}
.card-price{font-size:11px;color:#6B6860;}
.card-note{font-size:10px;color:#6B6860;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;margin-top:4px;line-height:1.4;}
.card-actions{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.card-cta{display:block;padding:8px 12px;text-align:center;font-size:9px;letter-spacing:.16em;text-transform:uppercase;background:#1C1B19;color:#fff;text-decoration:none;transition:opacity .18s;}
.card-cta:hover{opacity:.75;}
.card-cta2{display:block;padding:7px 12px;text-align:center;font-size:9px;letter-spacing:.14em;text-transform:uppercase;border:1px solid #C8C5BE;color:#6B6860;background:#fff;cursor:pointer;transition:all .18s;}
.card-cta2:hover{border-color:#1C1B19;color:#1C1B19;}
.footer{text-align:right;margin-top:10px;font-size:10px;color:#9E9C97;}
.footer a{color:#9E9C97;text-decoration:none;}
.footer a:hover{color:#1C1B19;}

/* ── Bottom site CTA ── */
.site-cta{display:block;margin-top:40px;padding:24px 20px;border:1px solid #E2DED7;text-align:center;text-decoration:none;color:#1C1B19;transition:background .2s;}
.site-cta:hover{background:#F9F7F4;}
.site-cta-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9E9C97;margin-bottom:8px;}
.site-cta-headline{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:300;color:#1C1B19;margin-bottom:6px;}
.site-cta-sub{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-style:italic;color:#6B6860;margin-bottom:14px;}
.site-cta-btn{display:inline-block;padding:9px 22px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:#1C1B19;color:#fff;}
.loading{text-align:center;padding:60px 20px;font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#9E9C97;letter-spacing:.08em;}
.error{text-align:center;padding:60px 20px;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;color:#B03030;}

/* ── Buying options overlay ── */
.opts-overlay{position:fixed;inset:0;background:rgba(28,27,25,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.opts-overlay.open{display:flex;}
.opts-box{background:#fff;max-width:480px;width:100%;padding:28px 28px 24px;position:relative;max-height:90vh;overflow-y:auto;}
.opts-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:#9E9C97;line-height:1;padding:4px 6px;}
.opts-thumb-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #E2DED7;}
.opts-thumb{width:52px;height:52px;object-fit:cover;background:#F2EFE9;display:block;flex-shrink:0;}
.opts-thumb-ph{width:52px;height:52px;background:#F2EFE9;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;color:#C8C5BE;flex-shrink:0;}
.opts-item-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;color:#1C1B19;line-height:1.3;}
.opts-item-brand{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9E9C97;margin-bottom:3px;}
.opts-list{display:flex;flex-direction:column;gap:8px;}
.opts-link{display:block;width:100%;padding:12px 16px;text-align:center;font-size:9px;letter-spacing:.14em;text-transform:uppercase;border:1px solid #1C1B19;color:#1C1B19;text-decoration:none;transition:all .18s;}
.opts-link:hover{background:#1C1B19;color:#fff;}
.opts-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9E9C97;margin-bottom:10px;}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .wrap{padding:24px 14px 48px;}
  .list-title{font-size:22px;}
  .opts-box{padding:22px 18px 20px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <a class="hdr-logo" href="https://maisontheposh.com">MAISONTHEPOSH</a>
    <div id="list-hdr"></div>
  </div>
  <div id="content"><div class="loading">Loading…</div></div>
  <a class="site-cta" href="https://maisontheposh.com" target="_blank" rel="noopener">
    <div class="site-cta-eyebrow">MaisonThePosh</div>
    <div class="site-cta-headline">Explore the Latest Finds</div>
    <div class="site-cta-sub">New arrivals, curated edits &amp; more — updated weekly</div>
    <span class="site-cta-btn">Visit the Site →</span>
  </a>
  <div class="footer"><a href="https://maisontheposh.com">maisontheposh.com</a></div>
</div>

<!-- Buying options overlay -->
<div class="opts-overlay" id="opts-overlay" onclick="if(event.target===this)closeOpts()">
  <div class="opts-box">
    <button class="opts-close" onclick="closeOpts()">×</button>
    <div class="opts-thumb-row">
      <div id="opts-thumb-wrap"></div>
      <div>
        <div class="opts-item-brand" id="opts-brand"></div>
        <div class="opts-item-name" id="opts-name"></div>
      </div>
    </div>
    <div class="opts-title">All buying options</div>
    <div class="opts-list" id="opts-list"></div>
  </div>
</div>

<script>
const SUPA_URL='https://epfabylszufvjnubyvnj.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwZmFieWxzenVmdmpudWJ5dm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTMxNjcsImV4cCI6MjA4OTQyOTE2N30.2e9EtH0iDJbklgIT0__ypH87K-5MpuPqVK2hQMwkjIE';

// ── Back navigation: pressing browser back always goes to main site ──
history.replaceState({widget:true},'',location.href);
window.addEventListener('popstate',function(e){
  if(e.state&&e.state.widget){
    // User pressed back — send them to the main site
    window.location.href='https://maisontheposh.com';
  }
});

function h(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Buying options overlay ──
let _optsItem=null;
function openOpts(it,e){
  if(e){e.preventDefault();e.stopPropagation();}
  _optsItem=it;
  // Thumb
  const tw=document.getElementById('opts-thumb-wrap');
  tw.innerHTML=it.image
    ?`<img class="opts-thumb" src="${h(it.image)}" alt="${h(it.name)}">`
    :`<div class="opts-thumb-ph">${h((it.brand||'?')[0])}</div>`;
  document.getElementById('opts-brand').textContent=it.brand||'';
  document.getElementById('opts-name').textContent=it.name||'';
  // Collect all links
  const links=[it.link,it.link2,it.link3,it.link4,it.link5,it.link6].filter(Boolean);
  const labels=['Shop now','Option 2','Option 3','Option 4','Option 5','Option 6'];
  document.getElementById('opts-list').innerHTML=links.map((url,i)=>
    `<a class="opts-link" href="${h(url)}" target="_blank" rel="noopener">${labels[i]} →</a>`
  ).join('');
  document.getElementById('opts-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOpts(){
  document.getElementById('opts-overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeOpts();});

async function load(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const idsParam=params.get('ids');

  function renderCards(items){
    if(!items||!items.length){
      document.getElementById('content').innerHTML='<div class="loading" style="color:#C8C5BE;">No items yet.</div>';
      return;
    }
    // Store items for the overlay to reference
    window._widgetItems=items;

    const cards=items.map((it,idx)=>{
      const img=it.image
        ?`<img class="card-img" src="${h(it.image)}" alt="${h(it.name)}" loading="lazy">`
        :`<div class="card-ph">${h((it.brand||'?')[0])}</div>`;
      const extraLinks=[it.link2,it.link3,it.link4,it.link5,it.link6].filter(Boolean);
      const hasOpts=extraLinks.length>0;
      return `<div class="card" onclick="if(!event.defaultPrevented)openOpts(window._widgetItems[${idx}],event)">
        ${img}
        <div class="card-info">
          <div class="card-brand">${h(it.brand)}</div>
          <div class="card-name">${h(it.name)}</div>
          <div class="card-price">${it.price?'$'+h(it.price):''}</div>
          ${it.note?`<div class="card-note">${h(it.note)}</div>`:''}
          <div class="card-actions">
            <a class="card-cta" href="${h(it.link||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Shop Now →</a>
            ${hasOpts?`<span class="card-cta2" onclick="event.stopPropagation();openOpts(window._widgetItems[${idx}],event)">${extraLinks.length} More Option${extraLinks.length>1?'s':''} →</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('content').innerHTML=`<div class="grid">${cards}</div>`;
  }

  try{
    if(idsParam){
      const ids=idsParam.split(',').map(s=>s.trim()).filter(Boolean);
      if(!ids.length){document.getElementById('content').innerHTML='<div class="error">No items specified.</div>';return;}
      document.title='MaisonThePosh · Custom Edit';
      document.getElementById('list-hdr').innerHTML='<div class="list-title">My Edit</div>';
      const iRes=await fetch(`${SUPA_URL}/rest/v1/items?id=in.(${ids.map(id=>encodeURIComponent(id)).join(',')})&select=*`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}});
      const allItems=await iRes.json();
      const ordered=ids.map(id=>allItems.find(it=>it.id===id)).filter(Boolean);
      renderCards(ordered);
    } else if(id){
      const [lRes,iRes]=await Promise.all([
        fetch(`${SUPA_URL}/rest/v1/lists?id=eq.${encodeURIComponent(id)}&select=*`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}}),
        fetch(`${SUPA_URL}/rest/v1/items?list_id=eq.${encodeURIComponent(id)}&select=*&order=created_at.desc`,{headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}})
      ]);
      const [lists,items]=await Promise.all([lRes.json(),iRes.json()]);
      const list=lists[0];
      if(!list){document.getElementById('content').innerHTML='<div class="error">List not found.</div>';return;}
      document.title=`MaisonThePosh · ${list.name}`;
      document.getElementById('list-hdr').innerHTML=
        `<div class="list-title">${h(list.name)}</div>`+
        (list.note?`<div class="list-note">${h(list.note)}</div>`:'');
      renderCards(items);
    } else {
      document.getElementById('content').innerHTML='<div class="error">No list specified.</div>';
    }
  }catch(e){
    document.getElementById('content').innerHTML='<div class="error">Could not load. Please try again.</div>';
  }
}
load();
</script>
</body>
</html>
